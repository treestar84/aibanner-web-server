name: Snapshot Pipeline (Realtime)

on:
  schedule:
    - cron: "0 2,8,14,20 * * *" # KST 05:00 / 11:00 / 17:00 / 23:00
  workflow_dispatch:

concurrency:
  group: snapshot-pipeline-realtime
  cancel-in-progress: false

jobs:
  run-snapshot-realtime:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Trigger realtime snapshot pipeline
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail

          if [ -z "${APP_URL:-}" ] || [ -z "${CRON_SECRET:-}" ]; then
            echo "APP_URL or CRON_SECRET is missing"
            exit 1
          fi

          endpoint="${APP_URL%/}/api/cron/snapshot?mode=realtime&retention=0"
          body_file="$(mktemp)"
          success=0
          status="000"

          for attempt in 1 2 3; do
            echo "[snapshot-realtime] attempt=${attempt} endpoint=${endpoint}"
            status="$(curl -sS \
              -o "${body_file}" \
              -w "%{http_code}" \
              -X GET "${endpoint}" \
              -H "Authorization: Bearer ${CRON_SECRET}" \
              --max-time 300 || true)"

            if [ "${status}" -ge 200 ] && [ "${status}" -lt 300 ]; then
              success=1
              break
            fi

            if [ "${status}" -ge 400 ] && [ "${status}" -lt 500 ] && [ "${status}" -ne 429 ]; then
              break
            fi

            sleep $((attempt * 10))
          done

          {
            echo "## Realtime Snapshot Trigger Result"
            echo ""
            echo "- Endpoint: \`${endpoint}\`"
            echo "- HTTP Status: \`${status}\`"
            echo "- Success: \`${success}\`"
            echo ""
            echo "### Response"
            echo '```json'
            cat "${body_file}"
            echo ""
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

          if [ "${success}" -ne 1 ]; then
            echo "[snapshot-realtime] failed with status=${status}"
            cat "${body_file}"
            exit 1
          fi
